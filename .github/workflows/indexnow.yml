name: Submit URLs to IndexNow
on: workflow_dispatch

jobs:
  check-and-submit:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Setup IndexNow
        run: echo ${{ secrets.INDEXNOW_KEY }} > ${{ secrets.INDEXNOW_KEY }}.txt

      - name: indexnow-action
        uses: bojieyang/indexnow-action@v1
        with:
          sitemap-location: https://thejiahao.github.io/zh-cn/sitemap.xml
          key: ${{ secrets.INDEXNOW_KEY }}
          key-location: https://thejiahao.github.io/${{ secrets.INDEXNOW_KEY }}.txt
          failure-strategy: error
